# Nginx reverse proxy for the next-candle prediction dashboard.
#
# Install to:  /etc/nginx/sites-available/tradebotvol.com
# Enable with: sudo ln -s /etc/nginx/sites-available/tradebotvol.com \
#                         /etc/nginx/sites-enabled/tradebotvol.com
#
# This file starts as HTTP-only on port 80. After you run Certbot
# (`sudo certbot --nginx -d tradebotvol.com -d www.tradebotvol.com`) it will
# automatically inject the TLS (443) server block and the HTTP->HTTPS redirect.
# The commented 443 block below documents the final result Certbot produces.

server {
    listen 80;
    listen [::]:80;
    server_name tradebotvol.com www.tradebotvol.com;

    # Certbot writes the ACME challenge here during issuance/renewal.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # required proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / upgrade support (harmless if the app only uses meta-refresh)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 90s;
    }
}

